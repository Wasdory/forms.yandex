<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #fff;
        }

        /* Экран загрузки */
        .loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }

        .yandex-logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }

        .ya-red {
            color: #FC3F1D;
            font-weight: 700;
        }

        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 14px;
            color: #888;
        }

        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Контейнер плеера */
        #player-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            background: #000;
        }

        #player-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Лёгкая подсказка (можно убрать) */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-family: sans-serif;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
        }
    </style>
    <!-- Kinescope IFrame API -->
    <script src="https://player.kinescope.io/latest/iframe.player.js"></script>
</head>
<body>

    <!-- Экран-обманка -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <span class="ya-red">Я</span><span>ндекс</span>
                <span style="margin-left: 8px; font-weight: 400;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2025 · Конфиденциальность
        </div>
    </div>

    <!-- Контейнер для плеера Kinescope -->
    <div id="player-container"></div>
    <div class="hint" id="hint">Нажмите в любом месте, чтобы продолжить</div>

    <script>
        (function() {
            // --- НАСТРОЙКИ ---
            const VIDEO_ID = 'iPyUKPvrLoJK22nzmE5jiF';  // ваш ID видео
            
            const loadingScreen = document.getElementById('loadingScreen');
            const playerContainer = document.getElementById('player-container');
            const hint = document.getElementById('hint');
            
            let player = null;
            let isActivated = false;

            // --- Инициализация плеера (без звука) ---
            window.onKinescopeIframeAPIReady = function(playerFactory) {
                playerFactory.create('player-container', {
                    url: `https://kinescope.io/embed/${VIDEO_ID}`,
                    behaviour: {
                        autoPlay: true,   // разрешаем автозапуск
                        muted: true       // начинаем без звука (разрешено)
                    },
                    size: {
                        width: '100%',
                        height: '100%'
                    }
                }).then(function(p) {
                    player = p;
                    player.once(player.Events.Ready, function() {
                        console.log('✅ Плеер готов и ждёт первого касания');
                    });
                });
            };

            // --- Функция активации (включает звук, скрывает загрузку) ---
            function activate() {
                if (isActivated) return;
                isActivated = true;

                // Скрываем экран загрузки
                loadingScreen.classList.add('hidden');
                // Показываем плеер
                playerContainer.classList.add('active');
                // Скрываем подсказку
                if (hint) hint.style.opacity = '0';

                // Включаем звук и ставим громкость 50%
                if (player) {
                    player.unmute();
                    player.setVolume(0.5);
                    console.log('🔊 Звук включён, громкость 50%');
                }

                // Удаляем обработчики, чтобы не срабатывало повторно
                document.removeEventListener('click', activate);
                document.removeEventListener('touchstart', activate);
            }

            // --- Вешаем обработчики на любые действия ---
            document.addEventListener('click', activate, { once: true });
            document.addEventListener('touchstart', activate, { once: true, passive: true });
            
            // Дополнительно: на случай, если друг начнёт с клавиатуры
            document.addEventListener('keydown', activate, { once: true });

            console.log('🎯 Страница готова. Ждём первого касания...');
        })();
    </script>
</body>
</html>
