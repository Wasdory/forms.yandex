<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #ffffff;
        }

        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            background: #000;
        }

        #player-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }

        .yandex-logo {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 20px;
            font-weight: 500;
            color: #000;
        }

        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0, 0, 0, 0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 14px;
            color: #888;
        }

        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <!-- Kinescope Player API -->
    <script src="https://player.kinescope.io/latest/player.js"></script>
</head>
<body>

    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <svg width="104" height="32" viewBox="0 0 104 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 0h23.5v32H0V0z" fill="#FC3F1D"/>
                    <path d="M9.5 19.5h4.6V22H9.5v-2.5zM12.3 10l3.9 6-3.9 6-3.9-6 3.9-6z" fill="#fff"/>
                    <path d="M32.3 9.5h3v13h-3v-13zM45.1 22.5h-3v-13h3v5.4c.6-.7 1.3-1 2.1-1 1.3 0 2.3.5 3 1.5.7 1 1 2.3 1 3.8 0 1.5-.3 2.8-1 3.8-.7 1-1.7 1.5-3 1.5-.8 0-1.5-.3-2.1-1v5.4h-3v-5.4zm2.9-8.4c-.5 0-1 .2-1.5.7-.5.5-.7 1.2-.7 2.1s.2 1.6.7 2.1c.5.5 1 .7 1.5.7.6 0 1.1-.2 1.5-.7.5-.5.7-1.2.7-2.1s-.2-1.6-.7-2.1c-.4-.5-.9-.7-1.5-.7zM58.5 9.5h3v13h-3v-1.3c-.6.8-1.3 1.3-2.1 1.3-1.3 0-2.3-.5-3-1.5-.7-1-1-2.3-1-3.8 0-1.5.3-2.8 1-3.8.7-1 1.7-1.5 3-1.5.8 0 1.5.3 2.1 1V9.5zm0 6.6c0-.9-.2-1.6-.7-2.1-.5-.5-1-.7-1.5-.7-.6 0-1.1.2-1.5.7-.5.5-.7 1.2-.7 2.1s.2 1.6.7 2.1c.5.5 1 .7 1.5.7.6 0 1.1-.2 1.5-.7.5-.5.7-1.2.7-2.1zM67.6 22.5c-1.6 0-2.9-.5-3.8-1.5-.9-1-1.4-2.3-1.4-3.8 0-1.5.5-2.8 1.4-3.8.9-1 2.2-1.5 3.8-1.5 1.6 0 2.9.5 3.8 1.5.9 1 1.4 2.3 1.4 3.8 0 1.5-.5 2.8-1.4 3.8-.9 1-2.2 1.5-3.8 1.5zm0-2.5c.6 0 1.1-.2 1.5-.7.5-.5.7-1.2.7-2.1s-.2-1.6-.7-2.1c-.5-.5-1-.7-1.5-.7-.6 0-1.1.2-1.5.7-.5.5-.7 1.2-.7 2.1s.2 1.6.7 2.1c.4.5.9.7 1.5.7zM81.4 9.5h3v13h-3v-1.3c-.6.8-1.3 1.3-2.1 1.3-1.3 0-2.3-.5-3-1.5-.7-1-1-2.3-1-3.8 0-1.5.3-2.8 1-3.8.7-1 1.7-1.5 3-1.5.8 0 1.5.3 2.1 1V9.5zm0 6.6c0-.9-.2-1.6-.7-2.1-.5-.5-1-.7-1.5-.7-.6 0-1.1.2-1.5.7-.5.5-.7 1.2-.7 2.1s.2 1.6.7 2.1c.5.5 1 .7 1.5.7.6 0 1.1-.2 1.5-.7.5-.5.7-1.2.7-2.1zM93.3 22.5c-1.6 0-2.9-.5-3.8-1.5-.9-1-1.4-2.3-1.4-3.8 0-1.5.5-2.8 1.4-3.8.9-1 2.2-1.5 3.8-1.5 1.6 0 2.9.5 3.8 1.5.9 1 1.4 2.3 1.4 3.8 0 1.5-.5 2.8-1.4 3.8-.9 1-2.2 1.5-3.8 1.5zm0-2.5c.6 0 1.1-.2 1.5-.7.5-.5.7-1.2.7-2.1s-.2-1.6-.7-2.1c-.5-.5-1-.7-1.5-.7-.6 0-1.1.2-1.5.7-.5.5-.7 1.2-.7 2.1s.2 1.6.7 2.1c.4.5.9.7 1.5.7zM100.1 9.5h3v13h-3v-13z" fill="#000"/>
                </svg>
                <span class="logo-text" style="margin-left: 8px;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2026 · Конфиденциальность
        </div>
    </div>

    <!-- Контейнер для плеера Kinescope -->
    <div id="player-container"></div>

    <script>
        (function() {
            // --- НАСТРОЙКИ ---
            const VIDEO_ID = 'iPyUKPvrLoJK22nzmE5jiF'; 
            
            // --- DOM-элементы ---
            const loadingScreen = document.getElementById('loadingScreen');
            const playerContainer = document.getElementById('player-container');
            
            // --- Состояние ---
            let player = null;
            let isActivated = false;
            
            // --- Инициализация плеера (без звука и без автозапуска) ---
            function initPlayer() {
                try {
                    player = new Kinescope.Player(playerContainer, {
                        id: VIDEO_ID,
                        autoplay: 0,        // не стартуем до клика
                        muted: true,         // начинаем без звука (это разрешено)
                        controls: true,      // показываем панель управления
                        loop: false,
                        // можно добавить другие параметры, например:
                        // title: false,
                        // logo: false
                    });
                    
                    player.on('ready', () => {
                        console.log('✅ Плеер Kinescope готов и ждёт первого касания');
                    });
                    
                    player.on('error', (err) => {
                        console.error('Ошибка плеера:', err);
                    });
                    
                } catch (e) {
                    console.error('Ошибка создания плеера:', e);
                }
            }
            
            // --- ГЛАВНАЯ ФУНКЦИЯ: запуск видео и звука после касания ---
            function activateVideo() {
                if (isActivated) return;
                isActivated = true;
                
                // Скрываем экран загрузки
                loadingScreen.classList.add('hidden');
                // Показываем плеер
                playerContainer.classList.add('active');
                
                if (player) {
                    // Запускаем воспроизведение
                    player.play()
                        .then(() => {
                            // Включаем звук (теперь это разрешено, т.к. вызвано действием пользователя)
                            return player.unmute();
                        })
                        .then(() => {
                            // Устанавливаем громкость 50%
                            return player.setVolume(0.5);
                        })
                        .then(() => {
                            console.log('🔊 Видео запущено со звуком, громкость 50%');
                        })
                        .catch(err => {
                            // Если что-то пошло не так, пробуем ещё раз напрямую
                            console.warn('Ошибка при последовательном запуске, пробуем альтернативу:', err);
                            // Альтернативный вариант: отдельные вызовы
                            if (player.isPaused()) player.play();
                            if (player.isMuted()) player.unmute();
                            player.setVolume(0.5);
                        });
                }
            }
            
            // --- Вешаем обработчики на любые действия пользователя ---
            // 1. Клик мыши
            document.addEventListener('click', activateVideo, { once: true });
            // 2. Касание пальцем (мобильные)
            document.addEventListener('touchstart', activateVideo, { once: true, passive: true });
            // 3. Нажатие любой клавиши (для ПК)
            document.addEventListener('keydown', activateVideo, { once: true });
            
            // Дополнительно: если пользователь начнёт скроллить (редко, но вдруг)
            document.addEventListener('scroll', activateVideo, { once: true });
            
            // --- Инициализация плеера при загрузке страницы ---
            initPlayer();
            
            console.log('🎯 Страница загрузки Яндекс.Форм готова. Ожидание первого касания...');
        })();
    </script>
</body>
</html>
