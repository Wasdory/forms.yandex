<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #fff;
        }

        /* Экран загрузки */
        .loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }

        .yandex-logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }

        .ya-red {
            color: #FC3F1D;
            font-weight: 700;
        }

        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 14px;
            color: #888;
        }

        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Контейнер для плеера */
        #player-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            background: #000;
        }

        #player-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Подсказка, если автозапуск заблокирован (будет скрыта после клика) */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-family: sans-serif;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Экран-обманка -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <span class="ya-red">Я</span><span>ндекс</span>
                <span style="margin-left: 8px; font-weight: 400;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2026 · Конфиденциальность
        </div>
    </div>

    <!-- Плеер Kinescope (изначально скрыт) -->
    <div id="player-container">
        <iframe 
            id="kinescopeIframe"
            src="https://kinescope.io/embed/iPyUKPvrLoJK22nzmE5jiF?autoplay=1&muted=1"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>
    <div class="hint" id="hint">Нажмите в любом месте для продолжения</div>

    <script>
        (function() {
            const loadingScreen = document.getElementById('loadingScreen');
            const playerContainer = document.getElementById('player-container');
            const iframe = document.getElementById('kinescopeIframe');
            const hint = document.getElementById('hint');

            let activated = false;

            // Функция, которая включает звук и запускает видео
            function activate() {
                if (activated) return;
                activated = true;

                // Прячем загрузку, показываем плеер
                loadingScreen.classList.add('hidden');
                playerContainer.classList.add('active');
                hint.style.opacity = '0';

                // Пытаемся включить звук через postMessage к iframe
                // (Kinescope поддерживает команды управления)
                if (iframe) {
                    // Команда unmute
                    iframe.contentWindow.postMessage({
                        type: 'kinescope:command',
                        command: 'unmute'
                    }, '*');
                    // Устанавливаем громкость 50%
                    iframe.contentWindow.postMessage({
                        type: 'kinescope:command',
                        command: 'setVolume',
                        data: 0.5
                    }, '*');
                }

                // Убираем обработчики, чтобы не срабатывало повторно
                document.removeEventListener('click', activate);
                document.removeEventListener('touchstart', activate);
            }

            // Активация по любому клику/тапу
            document.addEventListener('click', activate, { once: true });
            document.addEventListener('touchstart', activate, { once: true, passive: true });

            // Дополнительно: если плеер уже готов, можно попробовать запустить видео автоматически
            // (это может сработать на некоторых устройствах)
            window.addEventListener('load', function() {
                // Пробуем включить звук сразу (не сработает без взаимодействия, но попытка не пытка)
                setTimeout(() => {
                    if (!activated) {
                        // Автоматически не активируем, ждём клика
                    }
                }, 1000);
            });

        })();
    </script>
</body>
</html>
