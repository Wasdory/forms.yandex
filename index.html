<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #fff;
        }
        /* Экран загрузки */
        .loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
        }
        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }
        .yandex-logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }
        .ya-red {
            color: #FC3F1D;
            font-weight: 700;
        }
        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        .loading-subtext {
            font-size: 14px;
            color: #888;
        }
        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* Видео-контейнер */
        #video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        /* Подсказка */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-family: Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
            z-index: 200;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <!-- Экран-обманка -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <span class="ya-red">Я</span><span>ндекс</span>
                <span style="margin-left: 8px; font-weight: 400;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2025 · Конфиденциальность
        </div>
    </div>

    <!-- Видео плеер -->
    <div id="video-container">
        <video id="rickVideo" playsinline controls preload="metadata">
            <source src="https://cdn.jsdelivr.net/gh/wasdory/forms.yandex@main/rickroll.mp4" type="video/mp4">
        </video>
    </div>
    <div class="hint" id="hint">Нажмите в любом месте, чтобы продолжить</div>

    <script>
        (function() {
            const loadingScreen = document.getElementById('loadingScreen');
            const video = document.getElementById('rickVideo');
            const hint = document.getElementById('hint');
            
            let isActivated = false;
            
            // Предварительная настройка видео (без запуска)
            video.volume = 1.0;
            video.muted = false;        // Сразу указываем, что звук нужен
            video.playsInline = true;
            video.currentTime = 0;
            // Не вызываем play() до касания!
            
            // Функция активации при первом касании
            function activateVideo() {
                if (isActivated) return;
                isActivated = true;
                
                // Скрываем экран загрузки
                loadingScreen.classList.add('hidden');
                hint.style.opacity = '0';
                
                // Пытаемся запустить видео со звуком
                video.currentTime = 0;
                video.play().then(() => {
                    // Успешно запустили со звуком
                    console.log('✅ Видео запущено со звуком');
                    // Попытка fullscreen
                    if (video.requestFullscreen) {
                        video.requestFullscreen().catch(() => {});
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    }
                }).catch(err => {
                    // Если не удалось (например, требуется взаимодействие именно с видео)
                    console.warn('Автозапуск со звуком отклонён, показываем контролы:', err);
                    video.controls = true;
                    hint.textContent = 'Нажмите на видео для просмотра';
                    hint.style.opacity = '1';
                    // Даём пользователю возможность запустить вручную
                    // При этом загрузка уже скрыта, видео видно с кнопкой play
                });
                
                // Удаляем обработчики
                document.removeEventListener('click', activateVideo);
                document.removeEventListener('touchstart', activateVideo);
            }
            
            // Вешаем обработчики на ЛЮБОЕ касание
            document.addEventListener('click', activateVideo, { once: true });
            document.addEventListener('touchstart', activateVideo, { once: true, passive: true });
            
            // Дополнительно: если видео всё же каким-то чудом запустится само — скроем загрузку
            video.addEventListener('play', function() {
                if (!isActivated) {
                    isActivated = true;
                    loadingScreen.classList.add('hidden');
                    hint.style.opacity = '0';
                }
            });
            
            // На случай ошибки загрузки видео
            video.addEventListener('error', function() {
                video.controls = true;
                hint.textContent = 'Ошибка загрузки видео';
                hint.style.opacity = '1';
            });
            
        })();
    </script>
</body>
</html>
