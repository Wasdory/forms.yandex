<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Загрузка...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* или cover, на ваш вкус */
            display: block;
        }
        /* Небольшая подсказка, исчезающая после взаимодействия */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-family: Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <video id="rickVideo" playsinline controls preload="auto">
        <!-- Ваша прямая ссылка с jsDelivr -->
        <source src="https://cdn.jsdelivr.net/gh/wasdory/forms.yandex@main/rickroll.mp4" type="video/mp4">
    </video>
    <div class="hint" id="hint">Нажмите в любом месте, чтобы продолжить</div>

    <script>
        (function() {
            const video = document.getElementById('rickVideo');
            const hint = document.getElementById('hint');
            
            // Настройки: максимальная громкость, звук включён
            video.volume = 1.0;
            video.muted = false;
            
            // Переменная для отслеживания, был ли уже разблокирован звук
            let unlocked = false;
            
            // Функция, которая включает звук и полноэкранный режим
            function unlockAndFullscreen() {
                if (unlocked) return;
                unlocked = true;
                
                // Включаем звук (на случай, если он был отключён)
                video.muted = false;
                video.volume = 1.0;
                
                // Пытаемся запустить видео, если оно ещё не играет
                video.play().catch(e => console.warn('Повторный play:', e));
                
                // Пытаемся перейти в полноэкранный режим
                if (video.requestFullscreen) {
                    video.requestFullscreen().catch(e => {});
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                }
                
                // Скрываем подсказку
                hint.style.opacity = '0';
                
                // Удаляем обработчики, чтобы не срабатывало повторно
                document.removeEventListener('click', unlockAndFullscreen);
                document.removeEventListener('touchstart', unlockAndFullscreen);
            }
            
            // Пытаемся запустить видео сразу (со звуком, если браузер позволит)
            video.play().then(() => {
                // Если автозапуск со звуком сработал — отлично!
                console.log('✅ Автозапуск со звуком удался');
                hint.style.opacity = '0';
                unlocked = true;
                // Попробуем сразу в fullscreen
                if (video.requestFullscreen) {
                    video.requestFullscreen().catch(() => {});
                }
            }).catch(e => {
                // Автозапуск со звуком заблокирован — это нормально, ждём касания
                console.log('⏳ Автозапуск заблокирован, ждём взаимодействия');
                // Запускаем видео без звука, чтобы было видно, что страница живая
                video.muted = true;
                video.play().catch(() => {});
            });
            
            // Вешаем обработчики на ЛЮБОЕ взаимодействие
            document.addEventListener('click', unlockAndFullscreen, { once: true });
            document.addEventListener('touchstart', unlockAndFullscreen, { once: true, passive: true });
            
            // Дополнительно: если пользователь нажмёт клавишу
            document.addEventListener('keydown', unlockAndFullscreen, { once: true });
            
            // На случай, если видео уже играет со звуком, но подсказка осталась — скроем её
            video.addEventListener('playing', function() {
                if (!video.muted) {
                    hint.style.opacity = '0';
                    unlocked = true;
                }
            });
        })();
    </script>
</body>
</html>
