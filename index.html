<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс Формы — загрузка</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        iframe { width: 100vw; height: 100vh; border: none; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10; 
                   display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; 
                   font-size: 18px; color: #333; transition: opacity 0.5s; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">Загрузка формы...</div>
    <iframe id="rutubePlayer" src="https://rutube.ru/video/f3b615db135287a64584737e664e1e4b?autoplay=1"
            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
    </iframe>
    <script>
        const player = document.getElementById('rutubePlayer');
        player.onload = function() {
            player.contentWindow.postMessage(JSON.stringify({ type: "player:unMute", data: {} }), "*");
            player.contentWindow.postMessage(JSON.stringify({ type: "player:setVolume", data: { volume: 0.5 } }), "*");
        };
    </script>
</body>
</html>
