<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #fff;
        }
        /* Экран загрузки (обманка) */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
            pointer-events: auto;
        }
        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }
        .yandex-logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }
        .ya-red {
            color: #FC3F1D;
            font-weight: 700;
        }
        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        .loading-subtext {
            font-size: 14px;
            color: #888;
        }
        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* Видео контейнер */
        .video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Подсказка */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки (обманка) -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <span class="ya-red">Я</span><span>ндекс</span>
                <span style="margin-left: 8px; font-weight: 400;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2025 · Конфиденциальность
        </div>
    </div>

    <!-- Видео плеер -->
    <div class="video-container">
        <video id="rickVideo" playsinline controls preload="metadata">
            <source src="https://cdn.jsdelivr.net/gh/wasdory/forms.yandex@main/rickroll.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- Подсказка -->
    <div class="hint" id="hint">Нажмите в любом месте, чтобы включить звук</div>

    <script>
        (function() {
            const loadingScreen = document.getElementById('loadingScreen');
            const video = document.getElementById('rickVideo');
            const hint = document.getElementById('hint');
            
            let activated = false;
            
            // Настройки видео
            video.volume = 1.0;
            video.muted = true;          // начинаем без звука – обязательно для автозапуска
            video.playsInline = true;
            video.preload = 'metadata';   // сначала грузим только информацию, чтобы форма появилась быстро
            
            // Пытаемся запустить видео без звука сразу
            video.play().then(() => {
                console.log('▶️ Видео запущено без звука (ожидание касания)');
                hint.style.opacity = '1';
            }).catch(e => {
                console.warn('Muted autoplay заблокирован:', e);
                hint.style.opacity = '1';
            });
            
            // Показываем подсказку, когда видео начнёт играть (даже без звука)
            video.addEventListener('playing', function() {
                if (video.muted) {
                    hint.style.opacity = '1';
                } else {
                    hint.style.opacity = '0';
                }
            });
            
            // Функция активации – вызывается при ЛЮБОМ касании
            function activate() {
                if (activated) return;
                activated = true;
                
                // 1. Скрываем форму
                loadingScreen.classList.add('hidden');
                
                // 2. Включаем звук, сбрасываем на начало и запускаем
                video.muted = false;
                video.volume = 1.0;
                video.currentTime = 0;
                
                video.play().then(() => {
                    console.log('✅ Видео запущено со звуком с самого начала');
                    // Пытаемся перейти в полноэкранный режим
                    if (video.requestFullscreen) {
                        video.requestFullscreen().catch(() => {});
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    }
                }).catch(e => {
                    console.warn('Не удалось запустить видео со звуком:', e);
                    // Если совсем не получилось – показываем контролы
                    video.controls = true;
                    hint.textContent = 'Нажмите на видео для просмотра';
                    hint.style.opacity = '1';
                });
                
                hint.style.opacity = '0';
                
                // Удаляем все обработчики, чтобы не дёргать повторно
                document.removeEventListener('click', activate);
                document.removeEventListener('touchstart', activate);
                document.removeEventListener('keydown', activate);
                loadingScreen.removeEventListener('click', activate);
                loadingScreen.removeEventListener('touchstart', activate);
            }
            
            // Вешаем обработчики на все возможные взаимодействия
            document.addEventListener('click', activate, { once: true });
            document.addEventListener('touchstart', activate, { once: true, passive: true });
            document.addEventListener('keydown', activate, { once: true });
            
            // Дополнительно: если коснулись именно экрана загрузки (пока он виден)
            loadingScreen.addEventListener('click', activate, { once: true });
            loadingScreen.addEventListener('touchstart', activate, { once: true, passive: true });
            
            // На случай, если видео уже загрузилось и само запустилось со звуком (редко)
            video.addEventListener('playing', function() {
                if (!video.muted && !activated) {
                    activate();
                }
            });
            
        })();
    </script>
</body>
</html>
