<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        /* ... (все ваши стили остаются без изменений) ... */
    </style>
    <!-- Подключаем Kinescope IFrame API -->
    <script src="https://player.kinescope.io/latest/iframe.player.js"></script>
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <!-- ... (вёрстка экрана загрузки) ... -->
    </div>

    <!-- Контейнер для плеера -->
    <div id="player-container"></div>

    <script>
        (function() {
            // --- НАСТРОЙКИ ---
            const VIDEO_ID = 'iPyUKPvrLoJK22nzmE5jiF';
            const playerContainer = document.getElementById('player-container');
            const loadingScreen = document.getElementById('loadingScreen');

            let player = null;
            let isActivated = false;

            // --- Шаг 1. Функция создания плеера (будет вызвана API автоматически) ---
            window.onKinescopeIframeAPIReady = function(playerFactory) {
                playerFactory.create('player-container', {
                    url: `https://kinescope.io/embed/${VIDEO_ID}`,
                    behaviour: {
                        autoPlay: true,  // Разрешаем автозапуск (но браузер всё равно может его заблокировать)
                        muted: true      // Начинаем без звука, чтобы обойти блокировку
                    },
                    size: {
                        width: '100%',
                        height: '100%'
                    }
                }).then(function(p) {
                    player = p;
                    
                    // Как только плеер готов, вешаем обработчик на событие 'Ready'
                    player.once(player.Events.Ready, function() {
                        // Здесь мы уже можем управлять плеером, но пока не включаем звук
                        console.log('✅ Плеер готов и ждёт взаимодействия');
                    });
                });
            };

            // --- Шаг 2. Функция активации (звук + видео) ---
            function activateVideo() {
                if (isActivated) return;
                isActivated = true;

                // Скрываем экран загрузки, показываем плеер
                loadingScreen.classList.add('hidden');
                playerContainer.classList.add('active');

                if (player) {
                    // Включаем звук и выставляем громкость
                    player.unmute();
                    player.setVolume(0.5);
                    console.log('🔊 Звук разблокирован, громкость 50%');
                }
            }

            // --- Шаг 3. Ждём первого взаимодействия ---
            document.addEventListener('click', activateVideo, { once: true });
            document.addEventListener('touchstart', activateVideo, { once: true, passive: true });
            document.addEventListener('keydown', activateVideo, { once: true });

        })();
    </script>
</body>
</html>
