<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Яндекс Формы — загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #ffffff;
        }

        /* Контейнер плеера (изначально скрыт) */
        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            background: #000;
        }

        #player-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Экран загрузки */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 50;
            transition: opacity 0.3s;
        }

        .yandex-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
        }

        .yandex-logo {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }

        .ya-red {
            color: #FC3F1D;
            font-weight: 700;
        }

        .loading-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10vh;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0, 0, 0, 0.08);
            border-top-color: #fc0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 14px;
            color: #888;
        }

        .yandex-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Подсказка (появляется только если плеер активен, но звук ещё не включен) */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-family: sans-serif;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hint.visible {
            opacity: 1;
        }
    </style>
    <!-- Kinescope Iframe Player API -->
    <script src="https://player.kinescope.io/latest/iframe.player.js"></script>
</head>
<body>

    <!-- Экран-обманка -->
    <div class="loading-screen" id="loadingScreen">
        <div class="yandex-header">
            <div class="yandex-logo">
                <span class="ya-red">Я</span><span>ндекс</span>
                <span style="margin-left: 8px; font-weight: 400;">Формы</span>
            </div>
        </div>
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка формы...</div>
            <div class="loading-subtext">Пожалуйста, подождите</div>
        </div>
        <div class="yandex-footer">
            © Яндекс, 2025 · Конфиденциальность
        </div>
    </div>

    <!-- Контейнер для плеера -->
    <div id="player-container"></div>
    
    <!-- Подсказка на случай, если звук не включился -->
    <div class="hint" id="hint">Нажмите для включения звука</div>

    <script>
        (function() {
            // --- НАСТРОЙКИ ---
            const VIDEO_ID = 'iPyUKPvrLoJK22nzmE5jiF';
            
            // DOM-элементы
            const loadingScreen = document.getElementById('loadingScreen');
            const playerContainer = document.getElementById('player-container');
            const hint = document.getElementById('hint');
            
            // Переменные
            let player = null;
            let isActivated = false;
            
            // --- Инициализация плеера через IFrame API ---
            // Дожидаемся готовности API (коллбэк будет вызван автоматически)
            window.onKinescopeIframeAPIReady = function(playerFactory) {
                playerFactory.create('player-container', {
                    url: `https://kinescope.io/embed/${VIDEO_ID}`,
                    behaviour: {
                        autoPlay: true,       // пытаемся запустить автоматически
                        muted: true           // начинаем без звука (браузер разрешит)
                    },
                    size: {
                        width: '100%',
                        height: '100%'
                    }
                }).then(function(p) {
                    player = p;
                    
                    // Плеер создан, ждём события готовности
                    player.once(player.Events.Ready, function() {
                        console.log('✅ Плеер Kinescope готов и ждёт касания');
                        // Показываем подсказку, если плеер уже активен (но он ещё скрыт)
                    });
                    
                    // Если видео по какой-то причине встало на паузу — можно попробовать запустить
                    player.on(player.Events.Pause, function() {
                        // Ничего не делаем
                    });
                }).catch(function(error) {
                    console.error('Ошибка создания плеера:', error);
                });
            };
            
            // --- Функция активации (включает звук и показывает плеер) ---
            function activateVideo() {
                if (isActivated) return;
                isActivated = true;
                
                // Скрываем экран загрузки
                loadingScreen.classList.add('hidden');
                // Показываем плеер
                playerContainer.classList.add('active');
                // Убираем подсказку
                hint.classList.remove('visible');
                
                if (player) {
                    // Включаем звук (теперь это разрешено, т.к. вызвано в ответ на клик)
                    player.unmute();
                    // Громкость 50%
                    player.setVolume(0.5);
                    console.log('🔊 Звук включён, громкость 50%');
                }
                
                // Удаляем обработчики, чтобы не срабатывало повторно
                document.removeEventListener('click', activateVideo);
                document.removeEventListener('touchstart', activateVideo);
                document.removeEventListener('keydown', activateVideo);
            }
            
            // --- Вешаем обработчики на первое взаимодействие ---
            document.addEventListener('click', activateVideo, { once: true });
            document.addEventListener('touchstart', activateVideo, { once: true, passive: true });
            document.addEventListener('keydown', activateVideo, { once: true });
            
            // На случай, если плеер ещё не готов, а пользователь уже кликнул — 
            // мы всё равно вызовем activateVideo, и когда плеер появится, команды выполнятся.
            // Для этого в activateVideo стоит проверка на наличие player, но unmute сработает.
            
            // Дополнительно: если плеер активирован, но звук по какой-то причине не включился,
            // покажем подсказку при наведении (на мобильных не сработает, но для ПК полезно)
            // Впрочем, это не обязательно.
            
            console.log('🎯 Страница загрузки готова. Ждём первого касания...');
        })();
    </script>
</body>
</html>
